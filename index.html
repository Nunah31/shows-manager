<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563EB">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="מופעים">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול מופעים</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Heebo', 'Arial Hebrew', Arial, sans-serif; background: #F0F4FF; min-height: 100vh; direction: rtl; font-size: 16px; }

  .header { background: linear-gradient(135deg, #1E3A5F 0%, #2563EB 100%); padding: 18px 16px 14px; color: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
  .header-inner { max-width: 640px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header p { font-size: 15px; opacity: 0.75; margin-top: 2px; }
  .btn-export { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5); border-radius: 10px; padding: 10px 16px; font-weight: 600; font-size: 15px; cursor: pointer; font-family: inherit; }
  .btn-export:hover { background: rgba(255,255,255,0.3); }
  .btn-add { background: white; color: #1E3A5F; border: none; border-radius: 10px; padding: 10px 16px; font-weight: 700; font-size: 15px; cursor: pointer; font-family: inherit; }

  .main { max-width: 640px; margin: 0 auto; padding: 14px 12px 80px; }

  .filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-btn { padding: 7px 14px; border-radius: 20px; border: none; cursor: pointer; font-size: 15px; font-family: inherit; background: #E2E8F0; color: #374151; transition: all 0.15s; }
  .filter-btn.active { background: #2563EB; color: white; font-weight: 600; }

  .toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
  .btn-sm { padding: 7px 14px; border-radius: 8px; font-size: 15px; cursor: pointer; font-family: inherit; }
  .btn-outline-blue { background: white; border: 1px solid #2563EB; color: #2563EB; }
  .btn-outline-red  { background: white; border: 1px solid #EF4444; color: #EF4444; }
  .btn-solid-blue   { background: #2563EB; border: none; color: white; font-weight: 700; }

  .shows-list { display: flex; flex-direction: column; gap: 8px; }

  .show-card { background: white; border-radius: 12px; border: 2px solid transparent; box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: all 0.12s; }
  .show-card.selected { border-color: #2563EB; box-shadow: 0 0 0 4px rgba(37,99,235,0.08); }
  .show-card.past { opacity: 0.65; }
  .card-body { padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start; }

  .checkbox { width: 22px; height: 22px; border-radius: 5px; border: 2px solid #CBD5E1; background: white; flex-shrink: 0; margin-top: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
  .checkbox.checked { background: #2563EB; border-color: #2563EB; }
  .checkbox.checked::after { content: '✓'; color: white; font-size: 14px; line-height: 1; }

  .card-content { flex: 1; cursor: pointer; min-width: 0; }
  .card-top { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-bottom: 4px; }
  .card-date { font-weight: 700; font-size: 18px; color: #1E3A5F; }
  .badge { font-size: 13px; padding: 3px 9px; border-radius: 10px; font-weight: 500; border: 1px solid; }
  .time-badge { font-size: 13px; padding: 3px 8px; border-radius: 10px; }
  .card-location { font-size: 16px; color: #111827; }
  .card-location span { color: #64748B; font-size: 15px; }
  .card-show { font-size: 15px; color: #6B7280; margin-top: 2px; }
  .card-presenter { font-size: 15px; color: #64748B; margin-top: 2px; }
  .card-contact { font-size: 14px; color: #64748B; margin-top: 2px; }
  .card-team { font-size: 14px; color: #7C3AED; margin-top: 2px; }
  .card-notes { font-size: 13px; color: #9CA3AF; margin-top: 3px; font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .card-actions { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
  .icon-btn { background: #EFF6FF; border: none; border-radius: 7px; padding: 6px 10px; cursor: pointer; font-size: 16px; line-height: 1; text-decoration: none; display: block; text-align: center; }
  .icon-btn:hover { background: #DBEAFE; }

  /* Saving indicator */
  .save-indicator { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1E3A5F; color: white; padding: 10px 20px; border-radius: 20px; font-size: 15px; font-family: inherit; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .save-indicator.visible { opacity: 1; }

  /* Modal overlay */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 20px 20px 0 0; padding: 20px 16px 32px; width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-title { font-size: 20px; font-weight: 700; color: #1E3A5F; }
  .modal-close { background: #F1F5F9; border: none; border-radius: 50%; width: 34px; height: 34px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-full { grid-column: 1 / -1; }
  .field label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; padding: 9px 11px; border-radius: 8px; border: 1px solid #D1D5DB; font-size: 16px; font-family: inherit; background: white; color: #111827; outline: none; direction: rtl; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .field textarea { resize: vertical; line-height: 1.5; }

  .toggle-row { display: flex; gap: 8px; margin-top: 4px; }
  .toggle-opt { flex: 1; padding: 8px 0; border-radius: 8px; border: none; cursor: pointer; font-size: 15px; font-family: inherit; background: #E2E8F0; color: #374151; font-weight: 500; }
  .toggle-opt.active { background: #2563EB; color: white; font-weight: 700; }

  .form-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-save { flex: 1; padding: 13px; border-radius: 10px; border: none; cursor: pointer; background: #2563EB; color: white; font-weight: 700; font-size: 17px; font-family: inherit; }
  .btn-save:disabled { background: #CBD5E1; cursor: not-allowed; }
  .btn-delete { padding: 13px 16px; border-radius: 10px; border: none; cursor: pointer; background: #FEE2E2; color: #DC2626; font-weight: 700; font-size: 16px; font-family: inherit; }

  /* Team selection */
  .team-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .team-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 8px; border: 1px solid #E2E8F0; background: #F8FAFC; cursor: pointer; transition: all 0.12s; user-select: none; }
  .team-item:hover { background: #EFF6FF; border-color: #BFDBFE; }
  .team-item.selected { background: #EFF6FF; border-color: #2563EB; }
  .team-check { width: 20px; height: 20px; border-radius: 5px; border: 2px solid #CBD5E1; background: white; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.12s; }
  .team-item.selected .team-check { background: #2563EB; border-color: #2563EB; color: white; }
  .team-name { font-size: 15px; color: #1E293B; flex: 1; }
  .team-custom-row { display: flex; gap: 8px; margin-top: 6px; }
  .team-custom-row input { flex: 1; padding: 8px 10px; border-radius: 8px; border: 1px solid #D1D5DB; font-size: 15px; font-family: inherit; }
  .team-custom-row button { padding: 8px 14px; border-radius: 8px; border: none; background: #2563EB; color: white; font-size: 15px; font-family: inherit; cursor: pointer; font-weight: 600; }

  /* Send panel */
  .send-panel { display: none; position: fixed; inset: 0; background: white; z-index: 300; overflow-y: auto; }
  .send-panel.open { display: block; }
  .send-header { background: linear-gradient(135deg, #1E3A5F, #2563EB); padding: 16px; color: white; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; }
  .send-back { background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-size: 16px; font-family: inherit; }
  .send-body { max-width: 600px; margin: 0 auto; padding: 16px; }
  .msg-preview { background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 10px; padding: 14px; font-size: 16px; line-height: 1.9; color: #1E293B; white-space: pre-wrap; direction: rtl; text-align: right; margin-bottom: 14px; font-family: inherit; }
  .send-btns { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn-copy { padding: 11px 22px; border-radius: 10px; border: none; cursor: pointer; background: #2563EB; color: white; font-weight: 700; font-size: 16px; font-family: inherit; }
  .btn-copy.copied { background: #16A34A; }
  .btn-wa { padding: 11px 22px; border-radius: 10px; text-decoration: none; background: #25D366; color: white; font-weight: 700; font-size: 16px; font-family: inherit; display: inline-block; }

  .empty { text-align: center; color: #9CA3AF; padding: 40px 20px; font-size: 17px; }
  .footer-hint { text-align: center; color: #CBD5E1; font-size: 14px; margin-top: 16px; }

  @media (max-width: 640px) {
    body { font-size: 18px; }
    .header h1 { font-size: 28px; }
    .header p { font-size: 17px; }
    .btn-export, .btn-add { font-size: 17px; padding: 12px 18px; }
    .filter-btn { font-size: 17px; padding: 9px 16px; }
    .btn-sm { font-size: 17px; padding: 9px 16px; }
    .card-date { font-size: 22px; }
    .badge { font-size: 15px; padding: 4px 11px; }
    .time-badge { font-size: 15px; padding: 4px 9px; }
    .card-location { font-size: 19px; }
    .card-location span { font-size: 17px; }
    .card-show, .card-presenter { font-size: 17px; }
    .card-contact, .card-team { font-size: 16px; }
    .card-notes { font-size: 15px; }
    .icon-btn { font-size: 20px; padding: 8px 13px; }
    .modal-title { font-size: 22px; }
    .field label { font-size: 16px; }
    .field input, .field select, .field textarea { font-size: 18px; padding: 11px 12px; }
    .toggle-opt { font-size: 17px; padding: 10px 0; }
    .btn-save { font-size: 19px; padding: 15px; }
    .btn-delete { font-size: 18px; padding: 15px 18px; }
    .team-name { font-size: 17px; }
    .team-item { padding: 9px 12px; }
    .team-custom-row input, .team-custom-row button { font-size: 17px; padding: 10px 14px; }
    .send-back { font-size: 18px; padding: 9px 16px; }
    .msg-preview { font-size: 18px; line-height: 2; }
    .btn-copy, .btn-wa { font-size: 18px; padding: 13px 24px; }
    .empty { font-size: 19px; }
    .footer-hint { font-size: 16px; }
    .save-indicator { font-size: 17px; padding: 12px 22px; }
    .modal-close { width: 38px; height: 38px; font-size: 22px; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-inner">
    <div>
      <h1>🎵 ניהול מופעים</h1>
      <p id="show-count"></p>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-export" onclick="exportExcel()">📊 ייצוא אקסל</button>
      <button class="btn-export" onclick="openSettings()" title="הגדרות">⚙️</button>
      <button class="btn-add" onclick="openAdd()">➕ מופע חדש</button>
    </div>
  </div>
</div>

<div class="main">
  <!-- Filters -->
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="future" onclick="setFilter(this,'future')">עתידיים</button>
    <button class="filter-btn" data-filter="past" onclick="setFilter(this,'past')">עבר</button>
    <button class="filter-btn" data-filter="open" onclick="setFilter(this,'open')">לא סגורים ❓</button>
    <button class="filter-btn" data-filter="approved" onclick="setFilter(this,'approved')">מאושרים</button>
    <button class="filter-btn" data-filter="morning" onclick="setFilter(this,'morning')">בוקר ☀️</button>
    <button class="filter-btn" data-filter="evening" onclick="setFilter(this,'evening')">ערב 🌙</button>
    <button class="filter-btn" data-filter="all" onclick="setFilter(this,'all')">הכל</button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn-sm btn-outline-blue" onclick="selectAll()">בחר הכל</button>
    <button class="btn-sm btn-outline-red" id="btn-clear" style="display:none" onclick="clearSel()">נקה בחירה</button>
    <button class="btn-sm btn-solid-blue" id="btn-send" style="display:none" onclick="openSend()">📤 שלח לנגנים</button>
  </div>

  <!-- List -->
  <div class="shows-list" id="shows-list"></div>
  <p class="footer-hint">✏️ ערוך · 📅 הוסף ליומן גוגל · ☑️ סמן לשליחה לנגנים</p>
</div>

<!-- Save indicator -->
<div class="save-indicator" id="save-indicator">💾 נשמר...</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">➕ מופע חדש</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="field"><label>תאריך *</label><input type="date" id="f-date"></div>
      <div class="field"><label>שעת התחלה</label><input type="time" id="f-time" placeholder="לא חובה"></div>
      <div class="field"><label>מספר סבבים</label><input type="number" id="f-count" min="1" max="10" value="1"></div>
      <div class="field"><label>סטטוס</label>
        <select id="f-status">
          <option value="">ללא סטטוס</option>
          <option value="approved">מאושר 👍</option>
          <option value="pending">ממתין אישור ⏳</option>
          <option value="open">לא סגור ❓</option>
          <option value="signature">ממתין חתימה 📝</option>
          <option value="done">התקיים ✅</option>
          <option value="postponed">נדחה 🔴</option>
          <option value="moved">הוזז ↩️</option>
          <option value="cancelled">בוטל ❌</option>
        </select>
      </div>
      <div class="field form-full"><label>מיקום *</label><input type="text" id="f-location" placeholder="עיר / מוסד"></div>
      <div class="field form-full"><label>שם המופע / תוכנית</label><input type="text" id="f-show" placeholder="מסע ישראלי / לאהבה שלי אין סוף..."></div>
      <div class="field"><label>שכבת גיל / קהל</label><input type="text" id="f-type" placeholder="יסודי / תיכון..."></div>
      <div class="field"><label>מי מביא</label><input type="text" id="f-presenter" placeholder="מנשה / אנחנו..."></div>
      <div class="field"><label>איש קשר</label><input type="text" id="f-contact" placeholder="שם איש הקשר"></div>
      <div class="field"><label>טלפון</label><input type="tel" id="f-phone" placeholder="050-0000000" dir="ltr"></div>
      <div class="field"><label>שעת המופע</label>
        <div class="toggle-row">
          <button class="toggle-opt active" id="tog-morning" onclick="setMorning(true)">☀️ בוקר</button>
          <button class="toggle-opt" id="tog-evening" onclick="setMorning(false)">🌙 ערב</button>
        </div>
      </div>
      <div class="field form-full"><label>הערות</label><textarea id="f-notes" rows="3" placeholder="הערות חופשיות..."></textarea></div>

      <!-- Team selection -->
      <div class="field form-full">
        <label>👥 צוות למופע</label>
        <div class="team-list" id="team-list"></div>
        <div class="team-custom-row">
          <input type="text" id="custom-member-input" placeholder="הוסף איש צוות...">
          <button onclick="addCustomMember()">הוסף</button>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-save" id="btn-save" onclick="saveForm()">➕ הוסף מופע</button>
      <button class="btn-delete" id="btn-delete" style="display:none" onclick="deleteShow()">🗑️</button>
    </div>
  </div>
</div>

<!-- Send Panel -->
<div class="send-panel" id="send-panel">
  <div class="send-header">
    <button class="send-back" onclick="closeSend()">← חזרה</button>
    <h2 style="font-size:20px;font-weight:700" id="send-title">📤 שליחה לנגנים</h2>
  </div>
  <div class="send-body">
    <div class="msg-preview" id="msg-preview"></div>
    <div class="send-btns">
      <button class="btn-copy" id="btn-copy" onclick="copyMsg()">📋 העתק</button>
      <a class="btn-wa" id="btn-wa" href="#" target="_blank">💬 וואטסאפ</a>
    </div>
  </div>
</div>

<script>
let GITHUB_TOKEN = localStorage.getItem('gh_token') || '';
const GITHUB_REPO  = 'Nunah31/shows-manager';
const DATA_FILE    = 'shows_data.json';
let SCRIPT_URL = localStorage.getItem('sheets_script_url') || 'https://script.google.com/macros/s/AKfycbxtBGuEv5qnSdhqOw4roWYtL5n4EoKp5nc9GG-TNs8cos-S1RaMduS0Obg_yvoOA5AY/exec';

const GOOGLE_CLIENT_ID = '445601042786-j4f64beftudtg0nlcdg1kuqp0k08amqo.apps.googleusercontent.com';
const CALENDAR_SCOPE   = 'https://www.googleapis.com/auth/calendar.events';
let gAccessToken = null;
let tokenClient  = null;

const BASE_TEAM = [
  'בוריס – הגברה',
  'דניאל טהאן',
  'עמית כהן',
  'עומרי - גיטרה',
  'ניב רז',
  'גיל סמואל',
  'אריאל סקסופון',
  'שי ברק',
  'נתי כהן',
  'מתן דוד',
  'אדוארד – הגברה',
];

const STATUS_CFG = {
  done:      { label:'התקיים ✅',       bg:'#DCFCE7', text:'#166534', border:'#86EFAC' },
  approved:  { label:'מאושר 👍',        bg:'#DBEAFE', text:'#1E40AF', border:'#93C5FD' },
  pending:   { label:'ממתין אישור ⏳',  bg:'#FEF9C3', text:'#854D0E', border:'#FDE047' },
  open:      { label:'לא סגור ❓',      bg:'#FEE2E2', text:'#991B1B', border:'#FCA5A5' },
  signature: { label:'ממתין חתימה 📝', bg:'#FFF7ED', text:'#9A3412', border:'#FDBA74' },
  postponed: { label:'נדחה 🔴',         bg:'#FCE7F3', text:'#9D174D', border:'#F9A8D4' },
  moved:     { label:'הוזז ↩️',         bg:'#F0FDF4', text:'#166534', border:'#86EFAC' },
  cancelled: { label:'בוטל ❌',         bg:'#F1F5F9', text:'#475569', border:'#CBD5E1' },
  '':        { label:'ללא סטטוס',       bg:'#F8FAFC', text:'#94A3B8', border:'#E2E8F0' },
};

let shows = [];
let selected = new Set();
let currentFilter = 'future';
let editId = null;
let formMorning = true;
let fileSha = null;

// Team state for the form
let selectedTeam = new Set();  // names currently checked
let customMembers = [];        // extra names added in this form session

// ── GitHub helpers ──────────────────────────────────────────────────────────
async function loadFromGithub() {
  try {
    const r = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${DATA_FILE}`,
      { headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: 'application/vnd.github.v3+json' } });
    if (r.status === 404) return false;
    const d = await r.json();
    fileSha = d.sha;
    const binary = atob(d.content.replace(/\n/g,''));
    const bytes = new Uint8Array(binary.length);
    for (let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i);
    shows = JSON.parse(new TextDecoder('utf-8').decode(bytes));
    return true;
  } catch(e) { return false; }
}

async function saveToGithub() {
  showSaving();
  const jsonStr = JSON.stringify(shows, null, 2);
  const bytes2 = new TextEncoder().encode(jsonStr);
  let binary2 = '';
  bytes2.forEach(b => binary2 += String.fromCharCode(b));
  const content = btoa(binary2);
  const body = { message: 'עדכון מופעים', content, ...(fileSha ? { sha: fileSha } : {}) };
  try {
    const r = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${DATA_FILE}`,
      { method: 'PUT', headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const d = await r.json();
    fileSha = d.content?.sha;
    hideSaving();
  } catch(e) { hideSaving(); }
  // סנכרון לגוגל שיטס (ברקע)
  syncToSheets();
}

function syncToSheets() {
  if (!SCRIPT_URL) return;
  try {
    // שליחה דרך iframe נסתר — עוקפת CORS לחלוטין
    let iframe = document.getElementById('sync-iframe');
    if (!iframe) {
      iframe = document.createElement('iframe');
      iframe.id = 'sync-iframe';
      iframe.name = 'sync-iframe';
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
    }

    const form = document.createElement('form');
    form.method = 'POST';
    form.action = SCRIPT_URL;
    form.target = 'sync-iframe';
    form.style.display = 'none';

    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'data';
    input.value = JSON.stringify(shows);
    form.appendChild(input);

    document.body.appendChild(form);
    form.submit();
    setTimeout(() => document.body.removeChild(form), 3000);
  } catch(e) {}
}

function buildCalEvent(show) {
  const [y,m,day] = show.date.split('-');
  const pad = x => String(x).padStart(2,'0');
  let startDT, endDT;
  if (show.time) {
    const [hh,mm] = show.time.split(':');
    const totalMins = parseInt(hh)*60 + parseInt(mm) + Math.max(60, show.count*60);
    startDT = `${y}-${pad(m)}-${pad(day)}T${hh}:${mm}:00`;
    endDT   = `${y}-${pad(m)}-${pad(day)}T${pad(Math.floor(totalMins/60))}:${pad(totalMins%60)}:00`;
  } else {
    const sh = show.morning ? '09' : '19';
    startDT = `${y}-${pad(m)}-${pad(day)}T${sh}:00:00`;
    endDT   = `${y}-${pad(m)}-${pad(day)}T${pad(parseInt(sh)+Math.max(1,show.count))}:00:00`;
  }
  const presenter = (show.presenter||'').trim();
  const wePresent = presenter.toLowerCase() === 'אנחנו' || presenter === '';
  let titleParts = [];
  if (show.show) titleParts.push(show.show);
  if (!wePresent && show.presenter) titleParts.push(show.presenter);
  if (show.count > 1) titleParts.push(`${show.count} סבבים`);
  const summary = titleParts.join(' | ') || `מופע - ${show.location}`;
  let descParts = [];
  if (show.contact) descParts.push(`איש קשר: ${show.contact}${show.phone?' | '+show.phone:''}`);
  if (show.team && show.team.length>0) descParts.push(`צוות: ${show.team.join(', ')}`);
  if (show.type) descParts.push(`קהל: ${show.type}`);
  if (show.notes) descParts.push(`הערות: ${show.notes}`);
  return {
    summary,
    location: show.location || '',
    description: descParts.join('\n'),
    start: { dateTime: startDT, timeZone: 'Asia/Jerusalem' },
    end:   { dateTime: endDT,   timeZone: 'Asia/Jerusalem' }
  };
}

async function syncCalendarEvent(show) {
  if (!gAccessToken || !show.date) return null;
  const event = buildCalEvent(show);
  const idx = shows.findIndex(s => s.id === show.id);

  // נסה לעדכן אירוע קיים
  if (show.calEventId) {
    try {
      const r = await fetch(
        `https://www.googleapis.com/calendar/v3/calendars/primary/events/${show.calEventId}`,
        { method: 'PUT', headers: { 'Authorization': `Bearer ${gAccessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify(event) }
      );
      if (r.ok) {
        const d = await r.json();
        return d.id; // עדכון הצליח
      }
      // אם 404/410 — האירוע נמחק, ניצור חדש
      if (r.status !== 404 && r.status !== 410) return null;
      if (idx >= 0) shows[idx].calEventId = null; // נקה ID ישן
    } catch(e) { return null; }
  }

  // צור אירוע חדש
  try {
    const r = await fetch(
      'https://www.googleapis.com/calendar/v3/calendars/primary/events',
      { method: 'POST', headers: { 'Authorization': `Bearer ${gAccessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify(event) }
    );
    const d = await r.json();
    if (d.id && idx >= 0) {
      shows[idx].calEventId = d.id;
      await saveToGithub();
      return d.id;
    }
  } catch(e) {}
  return null;
}

async function handleCalClick(id) {
  const show = shows.find(s => s.id === id);
  if (!show) return;
  if (gAccessToken) {
    const indicator = document.getElementById('save-indicator');
    indicator.textContent = '📅 מסנכרן ליומן...';
    indicator.classList.add('visible');
    await syncCalendarEvent(show);
    indicator.textContent = show.calEventId ? '📅 יומן עודכן!' : '📅 נוסף ליומן!';
    setTimeout(() => indicator.classList.remove('visible'), 2000);
    render();
  } else {
    window.open(buildCalUrl(show), '_blank');
  }
}

// ── Rendering ───────────────────────────────────────────────────────────────
function fmtDate(d) { if(!d) return ''; const [y,m,day]=d.split('-'); return `${day}/${m}/${y.slice(2)}`; }

function buildCalUrl(s) {
  const [y,m,day] = s.date.split('-');
  const pad = x => String(x).padStart(2,'0');

  // Determine hour from explicit time or morning/evening default
  let h, endH;
  if (s.time) {
    const [hh, mm] = s.time.split(':');
    h = hh;
    const totalMins = parseInt(hh)*60 + parseInt(mm) + Math.max(60, s.count * 60);
    endH = pad(Math.floor(totalMins/60)) + pad(totalMins%60);
    const start = `${y}${pad(m)}${pad(day)}T${h}${mm}00`;
    const end   = `${y}${pad(m)}${pad(day)}T${endH}00`;

    // Title: show name / who brought / count if >1
    const presenter = (s.presenter||'').trim().toLowerCase();
    const wePresent = presenter === 'אנחנו' || presenter === '';
    let titleParts = [];
    if (s.show) titleParts.push(s.show);
    if (!wePresent && s.presenter) titleParts.push(s.presenter);
    if (s.count > 1) titleParts.push(`${s.count} סבבים`);
    const title = encodeURIComponent(titleParts.join(' | ') || `מופע - ${s.location}`);

    const loc = encodeURIComponent(s.location);

    // Details: contact+phone first, then team
    let detParts = [];
    if (s.contact) detParts.push(`איש קשר: ${s.contact}${s.phone ? ' | ' + s.phone : ''}`);
    if (s.team && s.team.length > 0) detParts.push(`צוות: ${s.team.join(', ')}`);
    if (s.show) detParts.push(`תוכנית: ${s.show}`);
    if (s.type) detParts.push(`קהל: ${s.type}`);
    if (s.notes) detParts.push(`הערות: ${s.notes}`);
    const det = encodeURIComponent(detParts.join('\n'));

    return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&location=${loc}&details=${det}`;
  }

  // No explicit time — use morning/evening default
  const startH = s.morning ? '09' : '19';
  const endHnum = parseInt(startH) + Math.max(1, s.count);
  const start = `${y}${pad(m)}${pad(day)}T${startH}0000`;
  const end   = `${y}${pad(m)}${pad(day)}T${pad(endHnum)}0000`;

  const presenter = (s.presenter||'').trim().toLowerCase();
  const wePresent = presenter === 'אנחנו' || presenter === '';
  let titleParts = [];
  if (s.show) titleParts.push(s.show);
  if (!wePresent && s.presenter) titleParts.push(s.presenter);
  if (s.count > 1) titleParts.push(`${s.count} סבבים`);
  const title = encodeURIComponent(titleParts.join(' | ') || `מופע - ${s.location}`);

  const loc = encodeURIComponent(s.location);
  let detParts = [];
  if (s.contact) detParts.push(`איש קשר: ${s.contact}${s.phone ? ' | ' + s.phone : ''}`);
  if (s.team && s.team.length > 0) detParts.push(`צוות: ${s.team.join(', ')}`);
  if (s.show) detParts.push(`תוכנית: ${s.show}`);
  if (s.type) detParts.push(`קהל: ${s.type}`);
  if (s.notes) detParts.push(`הערות: ${s.notes}`);
  const det = encodeURIComponent(detParts.join('\n'));

  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&location=${loc}&details=${det}`;
}

function getFiltered() {
  const today = new Date().toISOString().slice(0,10);
  let list = [...shows].sort((a,b) => a.date.localeCompare(b.date));
  if (currentFilter==='future')   return list.filter(s => s.date >= today);
  if (currentFilter==='past')     return list.filter(s => s.date < today);
  if (currentFilter==='approved') return list.filter(s => ['approved','done'].includes(s.status));
  if (currentFilter==='open')     return list.filter(s => ['open','pending','signature',''].includes(s.status));
  if (currentFilter==='morning')  return list.filter(s => s.morning && s.date >= today);
  if (currentFilter==='evening')  return list.filter(s => !s.morning && s.date >= today);
  return list;
}

    return `

            <span class="time-badge" style="background:${show.morning?'#FEF9C3':'#EFF6FF'};color:${show.morning?'#92400E':'#1E40AF'}">${show.morning?'☀️ בוקר':'🌙 ערב'}</span>
            ${show.count>1?`<span style="font-size:13px;color:#64748B">🔁 ${show.count}×</span>`:''}
          </div>

async function saveForm() {
  const date = document.getElementById('f-date').value;
  const location = document.getElementById('f-location').value.trim();
  if (!date || !location) return;
  const data = {
    date, location,
    show: document.getElementById('f-show').value.trim(),
    type: document.getElementById('f-type').value.trim(),
    presenter: document.getElementById('f-presenter').value.trim(),
    contact: document.getElementById('f-contact').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    time: document.getElementById('f-time').value || '',
    count: parseInt(document.getElementById('f-count').value) || 1,
    status: document.getElementById('f-status').value,
    morning: formMorning,
    notes: document.getElementById('f-notes').value.trim(),
    team: [...selectedTeam],
  };
  let savedId;
  if (editId) {
    const idx = shows.findIndex(s => s.id === editId);
    if (idx >= 0) {
      const calEventId = shows[idx].calEventId || null;
      shows[idx] = { ...data, id: editId, calEventId };
    }
    savedId = editId;
  } else {
    const newId = shows.length > 0 ? Math.max(...shows.map(s => s.id)) + 1 : 1;
    shows.push({ ...data, id: newId, calEventId: null });
    savedId = newId;
  }
  closeModal();
  render();
  await saveToGithub();
  // עדכון אוטומטי ביומן — רק אם האירוע כבר קיים ביומן
  if (gAccessToken) {
    const savedShow = shows.find(s => s.id === savedId);
    if (savedShow && savedShow.calEventId) { await syncCalendarEvent(savedShow); render(); }
  }
}

async function deleteShow() {
  if (!confirm('למחוק את המופע?')) return;
  shows = shows.filter(s => s.id !== editId);
  closeModal();
  render();
  await saveToGithub();
}

function exportExcel() {
  const STATUS_LABELS = {
    done:'התקיים', approved:'מאושר', pending:'ממתין אישור',
    open:'לא סגור', signature:'ממתין חתימה', postponed:'נדחה',
    moved:'הוזז', cancelled:'בוטל', '':'ללא סטטוס'
  };

  const data = shows.map(s => ({
    'תאריך': s.date ? s.date.split('-').reverse().join('/') : '',
    'שעה': s.time || '',
    'מיקום': s.location || '',
    'שם המופע': s.show || '',
    'שכבת גיל': s.type || '',
    'מי מביא': s.presenter || '',
    'איש קשר': s.contact || '',
    'טלפון': s.phone || '',
    'מס׳ סבבים': s.count || 1,
    'בוקר/ערב': s.morning ? 'בוקר' : 'ערב',
    'סטטוס': STATUS_LABELS[s.status] || '',
    'צוות': s.team ? s.team.join(', ') : '',
    'הערות': s.notes || '',
  }));

  const headers = ['תאריך','שעה','מיקום','שם המופע','שכבת גיל','מי מביא','איש קשר','טלפון','מס׳ סבבים','בוקר/ערב','סטטוס','צוות','הערות'];
  const ws = XLSX.utils.json_to_sheet(data, { header: headers });
  ws['!cols'] = [14,8,20,22,16,14,16,14,10,10,16,30,30].map(w => ({wch:w}));
  ws['!dir'] = 'rtl';

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'מופעים');

  const today = new Date().toISOString().slice(0,10).replace(/-/g,'');
  XLSX.writeFile(wb, `מופעים_${today}.xlsx`);
}

<script>
function saveToken() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return;
  localStorage.setItem('gh_token', t);
  GITHUB_TOKEN = t;
  document.getElementById('token-setup').style.display = 'none';
  init();
}
if (!localStorage.getItem('gh_token')) {
  document.getElementById('token-setup').style.display = 'flex';
}

function openSettings() {
  document.getElementById('settings-token').value = localStorage.getItem('gh_token') || '';
  document.getElementById('settings-script').value = localStorage.getItem('sheets_script_url') || '';
  document.getElementById('sheets-status').textContent = SCRIPT_URL ? '✅ מחובר לגוגל שיטס' : '⚪ לא מוגדר';
  document.getElementById('settings-modal').style.display = 'flex';
}

function closeSettings() {
  document.getElementById('settings-modal').style.display = 'none';
}

function saveSettings() {
  const token = document.getElementById('settings-token').value.trim();
  const scriptUrl = document.getElementById('settings-script').value.trim();
  if (token) { localStorage.setItem('gh_token', token); GITHUB_TOKEN = token; }
  if (scriptUrl) { localStorage.setItem('sheets_script_url', scriptUrl); SCRIPT_URL = scriptUrl; }
  closeSettings();
  // סנכרון מיידי עם הגדרות חדשות
  if (scriptUrl) syncToSheets();
}

async function testSheets() {
  const url = document.getElementById('settings-script').value.trim();
  if (!url) { document.getElementById('sheets-status').textContent = '⚠️ הכניסי URL קודם'; return; }
  document.getElementById('sheets-status').textContent = '⏳ בודק...';
  try {
    const formData = new URLSearchParams();
    formData.append('data', JSON.stringify(shows.slice(0, 2)));
    await fetch(url, { method: 'POST', mode: 'no-cors', body: formData });
    document.getElementById('sheets-status').textContent = '✅ נשלח! בדקי בגיליון';
  } catch(e) {
    document.getElementById('sheets-status').textContent = '❌ שגיאת חיבור';
  }
}
</script>
